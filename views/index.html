<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Sun Tracker Dashboard</title>
    <meta
      name="theme-color"
      content="#1877f2" />
    <meta
      name="apple-mobile-web-app-capable"
      content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default" />
    <meta
      name="apple-mobile-web-app-title"
      content="Sun Tracker" />
    <link
      rel="manifest"
      href="/manifest.webmanifest" />
    <link
      rel="icon"
      href="/icon.svg"
      type="image/svg+xml" />
    <link
      rel="apple-touch-icon"
      href="/apple-touch-icon.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="style.css" />
  </head>
  <body>
    <div class="container p-2">
      <div class="row">
        <div class="col-md-12">
          <div class="card-panel p-4 h-100">
            <div class="small-label">Raw feed</div>
            <h2 class="h4 mb-4">Realtime Solar Monitoring Dashboard</h2>
            <div
              class="list-grid"
              id="rawDataList"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script>
    $(document).ready(function () {
      const formatNumber = (value, suffix = "") => {
        const number = Number(value);

        if (Number.isNaN(number)) {
          return "--";
        }

        return `${number.toFixed(2)}${suffix}`;
      };

      const fetchStatus = () => {
        $.ajax({
          url: "/system-status",
          method: "GET",
          dataType: "json",
        })
          .done((data) => {
            renderRawList(data);
          })
          .fail((xhr) => {
            const message =
              xhr.responseJSON?.error || "Waiting for system status";
            showErrorState(message);
          });
      };

      const renderRawList = (data) => {
        const entries = [
          ["Temperature", formatNumber(data.temp, " C")],
          ["Solar Voltage", formatNumber(data.solarVolt, " V")],
          ["Battery Voltage", formatNumber(data.batteryVolt, " V")],
          ["Battery Capacity", formatNumber(data.battMah, " mAh")],
          ["Power", formatNumber(data.powerMW, " mW")],
          ["Battery Charge", formatNumber(data.battCharge, "%")],
          ["Battery Health", formatNumber(data.battHealth, "%")],
          ["Charge Estimate", data.chargeEST || "--"],
        ];

        const markup = entries
          .map(
            ([label, value]) => `
              <div class="list-item">
                <span class="small-label">${label}</span>
                <strong>${value}</strong>
              </div>
            `,
          )
          .join("");

        $("#rawDataList").html(markup);
      };

      fetchStatus();

      setInterval(fetchStatus, 5000);
    });
  </script>
</html>
