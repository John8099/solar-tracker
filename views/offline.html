<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sun Tracker Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: linear-gradient(180deg, #f7faff 0%, #eef3f8 100%);
        color: #132033;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .panel {
        max-width: 420px;
        padding: 1.5rem;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(24, 119, 242, 0.12);
        box-shadow: 0 24px 55px rgba(24, 119, 242, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.8rem;
      }

      p {
        margin: 0;
        color: #63738a;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Offline</h1>
      <p>Sun Tracker is unavailable right now. Reconnect to refresh live status and reporting analytics.</p>
    </div>
  </body>
</html>
